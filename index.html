<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwVywm2YvkEw2cOkizk_-nHYq-qOIhk3uJOvOIN3bFyL44RviEEgOQ1Mh4eQtbhcN82FA/exec";

function onScanSuccess(decodedText) {

  html5QrCode.pause();

  document.getElementById("result").innerText = "🔄 Checking...";

  // 🔥 KIRIM VIA GET
  fetch(API_URL + "?qr=" + decodedText, {
    method: "GET",
    mode: "no-cors"
  })
  .then(() => {

    document.getElementById("result").innerText = "✅ SCANNED";

    setTimeout(() => {
      html5QrCode.resume();
    }, 1500);

  })
  .catch(err => {
    document.getElementById("result").innerText = "❌ ERROR: " + err;
    html5QrCode.resume();
  });
}

</script>
